<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- Squircle clip -->
    <clipPath id="squircle">
      <rect x="16" y="16" width="480" height="480" rx="112" ry="112"/>
    </clipPath>
    <!-- Background gradient -->
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#0a0a1a"/>
    </linearGradient>
    <!-- Glass layer -->
    <linearGradient id="glass" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="white" stop-opacity="0.25"/>
      <stop offset="50%" stop-color="white" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="white" stop-opacity="0.15"/>
    </linearGradient>
    <!-- Accent glow -->
    <radialGradient id="glow" cx="0.5" cy="0.6" r="0.5">
      <stop offset="0%" stop-color="#00d4ff" stop-opacity="0.4"/>
      <stop offset="70%" stop-color="#0066ff" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#0022aa" stop-opacity="0"/>
    </radialGradient>
    <!-- Mic gradient -->
    <linearGradient id="micGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#60dfff"/>
      <stop offset="100%" stop-color="#3080ff"/>
    </linearGradient>
    <!-- Waveform color -->
    <linearGradient id="waveGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#00d4ff" stop-opacity="0.6"/>
      <stop offset="50%" stop-color="#60dfff" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#00d4ff" stop-opacity="0.6"/>
    </linearGradient>
    <!-- Highlight shine -->
    <linearGradient id="shine" x1="0.3" y1="0" x2="0.7" y2="0.5">
      <stop offset="0%" stop-color="white" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </linearGradient>
    <filter id="blur1">
      <feGaussianBlur stdDeviation="20"/>
    </filter>
  </defs>

  <g clip-path="url(#squircle)">
    <!-- Dark background -->
    <rect x="16" y="16" width="480" height="480" fill="url(#bg)"/>
    <!-- Glow -->
    <rect x="16" y="16" width="480" height="480" fill="url(#glow)" filter="url(#blur1)"/>
    <!-- Glass overlay -->
    <rect x="16" y="16" width="480" height="480" fill="url(#glass)"/>

    <!-- Waveform bars behind mic -->
    <g opacity="0.7">
      <rect x="88" y="220" width="18" height="72" rx="9" fill="url(#waveGrad)"/>
      <rect x="120" y="180" width="18" height="152" rx="9" fill="url(#waveGrad)"/>
      <rect x="152" y="200" width="18" height="112" rx="9" fill="url(#waveGrad)"/>
      <rect x="342" y="200" width="18" height="112" rx="9" fill="url(#waveGrad)"/>
      <rect x="374" y="180" width="18" height="152" rx="9" fill="url(#waveGrad)"/>
      <rect x="406" y="220" width="18" height="72" rx="9" fill="url(#waveGrad)"/>
    </g>

    <!-- Microphone body -->
    <rect x="216" y="140" width="80" height="160" rx="40" fill="url(#micGrad)" opacity="0.9"/>
    <!-- Mic highlight -->
    <rect x="226" y="148" width="30" height="80" rx="15" fill="url(#shine)"/>
    <!-- Mic stand arc -->
    <path d="M196 300 Q196 370 256 370 Q316 370 316 300" fill="none" stroke="url(#micGrad)" stroke-width="10" stroke-linecap="round" opacity="0.8"/>
    <!-- Mic stand -->
    <line x1="256" y1="370" x2="256" y2="410" stroke="url(#micGrad)" stroke-width="10" stroke-linecap="round" opacity="0.8"/>
    <!-- Mic base -->
    <line x1="226" y1="410" x2="286" y2="410" stroke="url(#micGrad)" stroke-width="10" stroke-linecap="round" opacity="0.8"/>

    <!-- Top highlight -->
    <ellipse cx="256" cy="80" rx="180" ry="60" fill="white" opacity="0.06"/>
  </g>

  <!-- Border -->
  <rect x="16" y="16" width="480" height="480" rx="112" ry="112" fill="none" stroke="white" stroke-opacity="0.15" stroke-width="1.5"/>
</svg>
