<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <clipPath id="squircle">
      <rect x="16" y="16" width="480" height="480" rx="112" ry="112"/>
    </clipPath>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f1b3d"/>
      <stop offset="100%" stop-color="#0a0e23"/>
    </linearGradient>
    <linearGradient id="glass" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="white" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="white" stop-opacity="0.05"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.45" cy="0.45" r="0.5">
      <stop offset="0%" stop-color="#7c5cff" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#2a1a6e" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="bubbleGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#b388ff" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#6c3fff" stop-opacity="0.3"/>
    </linearGradient>
    <linearGradient id="bubbleStroke" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#d4bbff" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#7c5cff" stop-opacity="0.3"/>
    </linearGradient>
    <linearGradient id="waveGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#b388ff"/>
      <stop offset="50%" stop-color="#e0ccff"/>
      <stop offset="100%" stop-color="#b388ff"/>
    </linearGradient>
    <filter id="blur1"><feGaussianBlur stdDeviation="25"/></filter>
    <filter id="softglow"><feGaussianBlur stdDeviation="4"/></filter>
  </defs>

  <g clip-path="url(#squircle)">
    <rect x="16" y="16" width="480" height="480" fill="url(#bg)"/>
    <rect x="16" y="16" width="480" height="480" fill="url(#glow)" filter="url(#blur1)"/>
    <rect x="16" y="16" width="480" height="480" fill="url(#glass)"/>

    <!-- Speech bubble -->
    <path d="M120 140 Q120 100 170 100 L342 100 Q392 100 392 140 L392 290 Q392 330 342 330 L210 330 L160 390 L170 330 L170 330 Q120 330 120 290 Z"
          fill="url(#bubbleGrad)" stroke="url(#bubbleStroke)" stroke-width="2"/>

    <!-- Glass reflection on bubble -->
    <path d="M140 140 Q140 115 175 115 L337 115 Q367 115 372 130 L372 160 Q300 170 200 165 Q150 162 140 155 Z"
          fill="white" opacity="0.08"/>

    <!-- Waveform inside bubble -->
    <g transform="translate(256, 215)">
      <path d="M-100,0 Q-80,-40 -60,0 Q-40,35 -20,0 Q0,-50 20,0 Q40,40 60,0 Q80,-35 100,0"
            fill="none" stroke="url(#waveGrad)" stroke-width="6" stroke-linecap="round" opacity="0.9"/>
      <!-- Glow copy -->
      <path d="M-100,0 Q-80,-40 -60,0 Q-40,35 -20,0 Q0,-50 20,0 Q40,40 60,0 Q80,-35 100,0"
            fill="none" stroke="#d4bbff" stroke-width="10" stroke-linecap="round" opacity="0.15" filter="url(#softglow)"/>
    </g>

    <!-- Subtle text lines -->
    <line x1="170" y1="160" x2="310" y2="160" stroke="#b388ff" stroke-width="3" stroke-linecap="round" opacity="0.25"/>
    <line x1="170" y1="178" x2="280" y2="178" stroke="#b388ff" stroke-width="3" stroke-linecap="round" opacity="0.18"/>
    <line x1="170" y1="258" x2="320" y2="258" stroke="#b388ff" stroke-width="3" stroke-linecap="round" opacity="0.25"/>
    <line x1="170" y1="276" x2="260" y2="276" stroke="#b388ff" stroke-width="3" stroke-linecap="round" opacity="0.18"/>

    <ellipse cx="256" cy="70" rx="180" ry="50" fill="white" opacity="0.04"/>
  </g>

  <rect x="16" y="16" width="480" height="480" rx="112" ry="112" fill="none" stroke="white" stroke-opacity="0.12" stroke-width="1.5"/>
</svg>
